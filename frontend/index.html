<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIMO AI — Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-theme-bg-color: #1c1c1e;
      --tg-theme-text-color: #ffffff;
      --tg-theme-hint-color: #98989e;
      --tg-theme-link-color: #0a84ff;
      --tg-theme-button-color: #0a84ff;
      --tg-theme-button-text-color: #ffffff;
      --tg-theme-secondary-bg-color: #2c2c2e;
      --tg-theme-section-header-text-color: #6d6d80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      background: var(--tg-theme-secondary-bg-color);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .status {
      font-size: 12px;
      color: var(--tg-theme-hint-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status::before {
      content: ""; width: 8px; height: 8px;
      background: #34c759; border-radius: 50%;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.4;
      font-size: 15px;
      word-wrap: break-word;
    }
    .user-msg {
      align-self: flex-end;
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border-bottom-right-radius: 4px;
    }
    .bot-msg {
      align-self: flex-start;
      background: var(--tg-theme-secondary-bg-color);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #message-input {
      flex: 1;
      background: var(--tg-theme-bg-color);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 12px 16px;
      color: var(--tg-theme-text-color);
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      overflow-y: auto;
    }
    #message-input:focus { border-color: var(--tg-theme-button-color); }
    #send-btn {
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    #send-btn:active { opacity: 0.7; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .typing {
      align-self: flex-start;
      background: var(--tg-theme-secondary-bg-color);
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      font-size: 12px;
      color: var(--tg-theme-hint-color);
      display: none;
    }
    .typing.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 MIMO AI</h1>
    <div class="status">Online</div>
  </div>
  <div class="chat-container" id="chat">
    <div class="message bot-msg">Hello! I'm MIMO AI assistant. Ask me anything.</div>
  </div>
  <div class="typing" id="typing">MIMO is typing…</div>
  <div class="input-area">
    <textarea id="message-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    document.body.style.backgroundColor = tg.themeParams.bg_color || '#1c1c1e';
    document.body.style.color = tg.themeParams.text_color || '#ffffff';
    const chat = document.getElementById('chat');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');
    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      sendBtn.disabled = this.value.trim() === '';
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener('click', send);
    function send() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, true);
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      typing.classList.add('active');
      tg.sendData(JSON.stringify({ action: 'chat', message: text }));
    }
    tg.onEvent('web_app_data_received', (data) => {
      typing.classList.remove('active');
      addMessage(data.text);
    });
  </script>
</body>
</html>
